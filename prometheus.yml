# ==============================================================================
# Prometheus Configuration for AgriSense ML Module
# ==============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # AgriSense API metrics
  - job_name: 'agrisense-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Redis metrics (if redis_exporter is added)
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']

  # PostgreSQL metrics (if postgres_exporter is added)
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']

# Alerting rules (optional)
